[network]
dataset = "Anaheim"
constraints_file = "data/TransportationNetworks/Anaheim/Anaheim_constraints.csv"

[solver]
approach = "Tapas"
approach_alpha = 1e-10
budget_function_multiplier = 10.0
budget_upper_bound = 14_000.0
link_capacity_selection_threshold = 1e-3
budget_threshold = 1e-1

[solver.route_based]
route_search_threads = 1

[output]
verbose = true
print_effective_config = true

[metrics]
enable_trace = true
enable_relative_gap = true
relative_gap_sample_period = 10
flush_every_n_points = 0
write_metadata_json = true
write_summary_csv = true
output_root = "performance_results"

[[pipeline]]
type = "nlopt"
algorithm = "LN_COBYLA"
max_iterations = 500
tolerance = 1e-4
