  [run]
  dataset = Winnipeg
  approach = Tapas
  shift_method = NewtonStep
  budget_function_multiplier = 0.001
  budget_upper_bound = 10000
  approach_alpha = 1e-14

  [metrics]
  enable_trace = true
  write_metadata_json = true
  write_summary_csv = true

  [step.0]
  type = optimality_condition
  max_iterations = 5