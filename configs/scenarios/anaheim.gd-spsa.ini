[run]
  dataset = Anaheim
  approach = TAPAS
  shift_method = NewtonStep
  budget_function_multiplier = 2
  budget_upper_bound = 100000
  approach_alpha = 1e-14

[metrics]
  enable_trace = true
  write_metadata_json = true
  write_summary_csv = true
flush_every_n_points = 10

[step.0]
type = gradient_descent
max_iterations = 200
tolerance = 1e-10
step_size = 10.0
fd_epsilon = 0.05
gradient_method = spsa
