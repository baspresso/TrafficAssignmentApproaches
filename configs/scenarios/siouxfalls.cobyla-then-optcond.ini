[run]
dataset = SiouxFalls
constraints_file = data/TransportationNetworks/SiouxFalls/SiouxFalls_constraints.csv
approach = RouteBased
approach_alpha = 1e-14
shift_method = NewtonStep
route_search_threads = 1
link_capacity_selection_threshold = 1e-3
budget_threshold = 1e-1
budget_function_multiplier = 5
budget_upper_bound = 100000
loader_verbose = true
print_effective_config = true


[metrics]
enable_trace = true
enable_relative_gap = true
relative_gap_sample_period = 10
flush_every_n_points = 0
write_metadata_json = true
write_summary_csv = true
output_root = performance_results
run_id =

flush_every_n_points = 10

[step.0]
type = nlopt
algorithm = LN_COBYLA
max_iterations = 200
tolerance = 0.0001

[step.1]
type = optimality_condition
max_iterations = 10
