[network]
dataset = "ChicagoSketch"

[solver]
approach = "Tapas"
approach_alpha = 1e-14
budget_function_multiplier = 5.0
budget_upper_bound = 50_000.0

[metrics]
enable_trace = true
write_metadata_json = true
write_summary_csv = true

[[pipeline]]
type = "nlopt"
algorithm = "LN_COBYLA"
max_iterations = 100
tolerance = 1e-4
