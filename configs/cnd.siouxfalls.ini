  [run]
  dataset = SiouxFalls
  approach = RouteBased
  shift_method = NewtonStep
  budget_function_multiplier = 5
  budget_upper_bound = 100000

  [metrics]
  enable_trace = true
  write_metadata_json = true
  write_summary_csv = true

  [step.0]
  type = optimlib
  algorithm = PSO
  max_iterations = 5
  population_size = 40