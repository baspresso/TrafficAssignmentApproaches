  [run]
  dataset = SiouxFalls
  approach = Tapas
  shift_method = NewtonStep
  budget_function_multiplier = 5
  budget_upper_bound = 100000
  approach_alpha = 1e-14

  [metrics]
  enable_trace = true
  write_metadata_json = true
  write_summary_csv = true

  [step.0]
  type = nlopt
  algorithm = LN_COBYLA
  max_iterations = 500
  tolerance = 1e-4