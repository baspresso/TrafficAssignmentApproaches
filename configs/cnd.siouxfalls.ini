  [run]
  dataset = SiouxFalls
  approach = TAPAS
  shift_method = NewtonStep
  budget_function_multiplier = 5
  budget_upper_bound = 100000

  [metrics]
  enable_trace = true
  write_metadata_json = true
  write_summary_csv = true

  [step.0]
  type = optimality_condition
  max_iterations = 50

  [step.1]
  type = nlopt
  algorithm = LN_COBYLA
  max_iterations = 100
  tolerance = 1e-4